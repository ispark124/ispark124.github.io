name: Build Site

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'post-template.html'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ posts.json art.json
          git diff --cached --quiet || git commit -m "build: regenerate site [skip ci]"
          git push
